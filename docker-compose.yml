name: ${COMPOSE_PROJECT_NAME:-nl-backend}

x-app-environment: &app-environment
  DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}

x-app-service: &app-service
  build: .
  env_file:
    - .env
  environment: *app-environment
  volumes:
    - .:/app
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

services:
  app:
    <<: *app-service
    mem_limit: 700m
    mem_reservation: 256m
    container_name: ${APP_CONTAINER_NAME:-nl-backend-app}
    ports:
      - "${APP_BIND_HOST:-0.0.0.0}:${APP_PORT:-8000}:8000"
    dns:
      - 8.8.8.8
      - 8.8.4.4

  postgres:
    image: postgres:16-alpine
    shm_size: 128m
    container_name: ${POSTGRES_CONTAINER_NAME:-nl-backend-postgres}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-nl_table}
      POSTGRES_SHARED_BUFFERS: ${POSTGRES_SHARED_BUFFERS:-128MB}
      POSTGRES_WORK_MEM: ${POSTGRES_WORK_MEM:-4MB}
      POSTGRES_MAX_CONNECTIONS: ${POSTGRES_MAX_CONNECTIONS:-50}
    ports:
      - "${POSTGRES_BIND_HOST:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-nl_table}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ${REDIS_CONTAINER_NAME:-nl-backend-redis}
    ports:
      - "${REDIS_BIND_HOST:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  celery-worker:
    <<: *app-service
    mem_limit: 900m
    mem_reservation: 256m
    container_name: ${CELERY_WORKER_CONTAINER_NAME:-nl-backend-celery-worker}
    command: celery -A tasks.celery_app:celery_app worker --loglevel=info
    dns:
      - 8.8.8.8
      - 8.8.4.4

  celery-beat:
    <<: *app-service
    mem_limit: 300m
    mem_reservation: 128m
    container_name: ${CELERY_BEAT_CONTAINER_NAME:-nl-backend-celery-beat}
    command: celery -A tasks.celery_app:celery_app beat --loglevel=info
    dns:
      - 8.8.8.8
      - 8.8.4.4

volumes:
  postgres_data:
    name: ${POSTGRES_VOLUME_NAME:-nl-backend_postgres_data}
