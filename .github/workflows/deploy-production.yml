name: Deploy production

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nl-table-production
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          PRODUCTION_KNOWN_HOSTS: ${{ secrets.PRODUCTION_KNOWN_HOSTS }}
        run: |
          install -d -m 0700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 0600 ~/.ssh/id_ed25519
          printf '%s\n' "$PRODUCTION_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Deploy tested commit
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
        run: |
          scp scripts/deploy_production.sh \
            "$PRODUCTION_USER@$PRODUCTION_HOST:/tmp/nl-table-deploy.sh"
          ssh "$PRODUCTION_USER@$PRODUCTION_HOST" \
            "chmod 0700 /tmp/nl-table-deploy.sh && \
             /tmp/nl-table-deploy.sh '$GITHUB_SHA'; \
             status=\$?; rm -f /tmp/nl-table-deploy.sh; exit \$status"
