limit_req_zone $binary_remote_addr zone=nl_table_api:10m rate=20r/s;

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name nl.vsepro100ai.ru;

    ssl_certificate /etc/letsencrypt/live/nl.vsepro100ai.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nl.vsepro100ai.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        limit_req zone=nl_table_api burst=60 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name nl.vsepro100ai.ru;
    return 301 https://$host$request_uri;
}
